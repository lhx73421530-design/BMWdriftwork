<!-- 3. 全屏放大遮罩层（Lightbox） - 默认隐藏 -->
<div id="lightbox" class="fixed inset-0 bg-black/95 z-[9999] hidden flex items-center justify-center p-4 md:p-12" onclick="closeLightbox()">
    <button class="absolute top-10 right-10 text-white text-4xl font-light hover:text-red-600">&times;</button>
    <img id="lightboxImg" src="" class="max-w-full max-h-full object-contain shadow-2xl">
</div>

<!-- 4. 核心脚本：实现切换与放大功能 -->
<script>
    // 切换大图函数
    function updateMainImage(src) {
        document.getElementById('mainImage').src = src;
    }

    // 开启全屏查看
    function openLightbox() {
        const mainSrc = document.getElementById('mainImage').src;
        document.getElementById('lightboxImg').src = mainSrc;
        document.getElementById('lightbox').classList.remove('hidden');
        document.body.style.overflow = 'hidden'; // 禁止背景滚动
    }

    // 关闭全屏查看
    function closeLightbox() {
        document.getElementById('lightbox').classList.add('hidden');
        document.body.style.overflow = 'auto'; // 恢复背景滚动
    }
</script>
